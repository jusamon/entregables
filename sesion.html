<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/otrosEstilos.css">
</head>

<body>
  <header class="cabeza">
    <div class="cajaLogo">
      <a href="#hero" class="brand-link">
        <img src="images/logo-sin-fondo.png" class="fotoLogo">
        <div class="texto-logo">
          <span class="textoL1 black-ops-one-regular">pharSYS</span><span class="textoL2 inter">DATABASE</span>
        </div>
      </a>      
    </div>
        
    <nav class="cajaMenu">
      <ul class="menu inter">
        <strong>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="contVentas.html">Contacto</a></li>
        </strong>
      </ul>
    </nav>
  </header>

  <main class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="signin-card">
      <h1 class="h3 mb-4 text-center">Iniciar sesión</h1>
      <form>
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="floatingInput" name="email" autocomplete="email" required placeholder="correo@ejemplo.com">
          <label for="floatingInput">Correo electrónico</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="floatingPassword" name="password" autocomplete="current-password" required placeholder="Contraseña">
          <label for="floatingPassword">Contraseña</label>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Recordarme</label>
          </div>
          <a href="#" class="small">¿Olvidaste tu contraseña?</a>
        </div>
        <button class="btn btn-primary w-100 py-2" type="submit">Iniciar sesión</button>
      </form>
      <p class="text-center text-muted mt-4 mb-0">¿No tienes cuenta? <a href="prueba.html">Prueba gratuita</a></p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="inter">© 2026 pharSYS. Soluciones seguras para la gestión farmacéutica.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
</body>
</html>
