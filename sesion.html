<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/otrosEstilos.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Sesión</title>
</head>

<body>

    <section id="cabeza">
        <div id="cajaLogo">
            <img src="images/logo-sin-fondo.png" id="fotoLogo">
            <span id="textoL1" class="black-ops-one-regular">pharSYS<span id="textoL2" class="inter">DATABASE</span></span>            
        </div>
        <nav id="menu" class="inter">
                <ul>
                    <strong>
                        <li><a href="index.html">Inicio</a></li>
                        <li><a href="contVentas.html">Contacto</a></li>
                    </strong>
                </ul>
            </nav>
    </section>



    <main class="form-singin">
            <form>
                <h1 class="archivo-black-regular">Por favor inicie Sesión</h1>
                <div class="form-floating">
                <input
                    type="email"
                    class="form-control"
                    id="floatingInput"
                    placeholder="nombre@ejemplo.com"
                />
                <label for="floatingInput">Correo Electrónico</label>
                </div>
                <div class="form-floating">
                <input
                    type="password"
                    class="form-control"
                    id="floatingPassword"
                    placeholder="Contraseña"
                />
                <label for="floatingPassword">Contraseña</label>
                </div>
                <div class="form-check text-start my-3">
                <input
                    class="form-check-input"
                    type="checkbox"
                    value="remember-me"
                    id="checkDefault"
                />
                <label class="form-check-label" for="checkDefault">
                    Recordarme
                </label>
                </div>
                <button class="btn btn-primary w-100 py-2" type="submit">
                Iniciar Sesión
                </button>
            </form>
    </main>




    
</body>
</html>
